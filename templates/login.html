<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediCare Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="page">
      <section class="hero-card">
        <div class="hero-copy">
          <div class="brand-block">
            <div class="brand-icon">✚</div>
            <div>
              <p class="eyebrow">Medicine care portal</p>
              <h1>Secure access to your health dashboard</h1>
              <p>Sign in to manage orders, check payments, and track deliveries in one place.</p>
            </div>
          </div>
        </div>

        <form id="loginForm" class="login-card" action="/login" method="post">
          <h2>Welcome back</h2>
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Enter username" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter password" required />

          <button type="submit">Sign in</button>
          <p class="hint">Demo login: enter any username and password to continue.</p>
          {% if error %}
          <p class="error">{{ error }}</p>
          {% endif %}
          <p id="message" class="form-message"></p>
        </form>
        <script src="{{ url_for('static', filename='script.js') }}"></script>
      </section>
    </div>
  </body>
</html>
